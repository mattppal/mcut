name: Documentation issue
description: Report confusing, missing, or incorrect documentation.
title: "docs: "
labels: ["documentation", "needs-triage"]
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link to the page, README, package, or section.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is unclear, missing, or wrong?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
    validations:
      required: false
