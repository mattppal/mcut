name: Feature request
description: Propose a new capability or package behavior.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or use case is blocked today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the API, behavior, or package surface you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include existing workarounds or related tools if relevant.
    validations:
      required: false
  - type: checkboxes
    id: clean-room
    attributes:
      label: Clean-room confirmation
      options:
        - label: This proposal does not copy code, identifiers, or documentation from license-incompatible projects.
          required: true
